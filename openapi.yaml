openapi: 3.0.3
info:
  title: Mono API
  version: 1.0.0
  description: |
    Mono is an AI-guided journaling web app that helps users start journaling,
    generate daily reflections, view mood history, and generate monthly recaps.

    This OpenAPI contract is intended for FE-BE contract-driven development.
servers:
  - url: https://api.mono.example.com
    description: Production placeholder
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Authentication — manual (email/password) and Google OAuth
  - name: Chat
    description: AI-guided daily journaling chat
  - name: Journals
    description: Daily journal summaries and calendar data
  - name: Recaps
    description: Monthly recap generation and retrieval

security:
  - bearerAuth: []

paths:
  # ─────────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register with email and password
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              register:
                value:
                  name: Alex
                  email: alex@example.com
                  password: secretpassword123
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  value:
                    user:
                      id: user_123
                      email: alex@example.com
                      name: Alex
                      avatarUrl: null
                      createdAt: "2026-05-10T10:00:00Z"
                      lastLoginAt: "2026-05-10T10:00:00Z"
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                conflict:
                  value:
                    code: EMAIL_ALREADY_EXISTS
                    message: This email is already registered.

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              login:
                value:
                  email: alex@example.com
                  password: secretpassword123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    code: INVALID_CREDENTIALS
                    message: Email or password is incorrect.

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    code: INVALID_REFRESH_TOKEN
                    message: Refresh token is invalid or has expired.

  /auth/google/callback:
    post:
      tags: [Auth]
      summary: Complete Google OAuth login
      operationId: googleOAuthCallback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleOAuthCallbackRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getCurrentUser
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─────────────────────────────────────────────
  # CHAT
  # ─────────────────────────────────────────────
  /chat/messages:
    get:
      tags: [Chat]
      summary: Get today's chat messages
      operationId: getTodayMessages
      description: |
        Returns all messages from today's active chat session.
        If no session exists today, returns an empty messages array
        and journalState with status empty.
      responses:
        "200":
          description: Today's chat history and journal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChatMessagesResponse"
              examples:
                withMessages:
                  value:
                    messages:
                      - id: msg_001
                        journalId: session_123
                        role: assistant
                        content: "Hi! How are you feeling today?"
                        createdAt: "2026-05-10T09:00:00Z"
                      - id: msg_002
                        journalId: session_123
                        role: user
                        content: "I feel a bit tired actually."
                        createdAt: "2026-05-10T09:01:00Z"
                    journalState:
                      date: "2026-05-10"
                      status: in_progress
                      userMessageCount: 1
                noSession:
                  value:
                    messages: []
                    journalState:
                      date: "2026-05-10"
                      status: empty
                      userMessageCount: 0
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Chat]
      summary: Send a user journal message and receive Mono's reply
      operationId: sendChatMessage
      description: |
        Sends a message to today's daily journal thread. If initialMood is
        provided, it is stored as structured journal data.
        Mono responds with empathetic validation and one reflective follow-up question.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageRequest"
            examples:
              firstMessage:
                value:
                  content: I feel tired today.
                  initialMood: tired
              followUpMessage:
                value:
                  content: I think I am overwhelmed by work.
                  initialMood: null
      responses:
        "200":
          description: Assistant reply and updated journal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendChatMessageResponse"
              examples:
                success:
                  value:
                    message:
                      id: msg_456
                      journalId: session_123
                      role: assistant
                      content: That sounds really tiring. What part of today felt the heaviest?
                      createdAt: "2026-05-10T12:00:00Z"
                    actions:
                      canSummarize: true
                      shouldOfferSummary: false
                      safetyFlag: none
                    journalState:
                      date: "2026-05-10"
                      status: in_progress
                      userMessageCount: 3
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─────────────────────────────────────────────
  # JOURNALS
  # ─────────────────────────────────────────────
  /journals/today/summarize:
    post:
      tags: [Journals]
      summary: Summarize today's journal
      operationId: summarizeTodayJournal
      description: |
        Generates a first-person daily journal summary for today's chat thread.
        Requires at least 3 user messages.
      responses:
        "200":
          description: Generated daily journal summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Journal"
        "400":
          description: Not enough user messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notEnoughMessages:
                  value:
                    code: NOT_ENOUGH_MESSAGES
                    message: You need at least 3 messages to summarize today's journal.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Summary generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                aiFailure:
                  value:
                    code: SUMMARY_GENERATION_FAILED
                    message: We could not generate your summary right now. Your chat was saved safely. Please try again.

  /journals/calendar:
    get:
      tags: [Journals]
      summary: Get calendar journal data for a month
      operationId: getJournalCalendar
      parameters:
        - name: month
          in: query
          required: true
          description: Month in YYYY-MM format.
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
          example: "2026-05"
      responses:
        "200":
          description: Calendar entries, streak, and monthly recap card state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /journals/{date}:
    get:
      tags: [Journals]
      summary: Get journal by date
      operationId: getJournalByDate
      parameters:
        - $ref: "#/components/parameters/DatePath"
      responses:
        "200":
          description: Journal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Journal"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Journal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value:
                    code: JOURNAL_NOT_FOUND
                    message: No journal found for this date.

    patch:
      tags: [Journals]
      summary: Update journal by date
      operationId: updateJournalByDate
      description: |
        Updates user-editable fields. Sets status to edited and isEdited to true.
        Does not trigger automatic summary regeneration.
      parameters:
        - $ref: "#/components/parameters/DatePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJournalRequest"
      responses:
        "200":
          description: Updated journal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Journal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Journal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────────
  # RECAPS
  # ─────────────────────────────────────────────
  /recaps/monthly:
    get:
      tags: [Recaps]
      summary: Get monthly recap state or generated recap
      operationId: getMonthlyRecap
      description: |
        Returns one of three possible states:
        - generated: recap exists and is ready to view
        - ready_to_generate: enough journals (>=3) but recap not yet generated
        - not_enough_data: fewer than 3 journals this month
      parameters:
        - name: month
          in: query
          required: true
          description: Month in YYYY-MM format.
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
          example: "2026-05"
      responses:
        "200":
          description: Monthly recap state or generated recap
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MonthlyRecap"
                  - $ref: "#/components/schemas/MonthlyRecapNotEnoughData"
                  - $ref: "#/components/schemas/MonthlyRecapReadyToGenerate"
              examples:
                generated:
                  value:
                    id: recap_123
                    userId: user_123
                    month: "2026-05"
                    status: generated
                    title: A Month of Slowing Down
                    summary: This month, you often moved between feeling tired and hopeful.
                    mostFrequentMood: tired
                    moodDistribution:
                      tired: 8
                      anxious: 5
                      calm: 4
                      happy: 3
                    topEmotionTags: [overwhelmed, uncertain, relieved]
                    topTopicTags: [work, self_esteem, personal_growth]
                    recurringPattern: You often felt overwhelmed when you expected yourself to handle everything at once.
                    monthlyInsight: You seem to be learning that rest is not a failure.
                    suggestedFocusNextMonth: Try noticing one small moment each day where you allow yourself to slow down.
                    journalCount: 17
                    generatedAt: "2026-05-31T23:00:00Z"
                    updatedAt: "2026-05-31T23:00:00Z"
                notEnoughData:
                  value:
                    month: "2026-05"
                    status: not_enough_data
                    journalCount: 2
                    minimumRequired: 3
                    message: You need at least 3 journal entries this month to generate a monthly recap.
                ready:
                  value:
                    month: "2026-05"
                    status: ready_to_generate
                    journalCount: 5
                    minimumRequired: 3
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /recaps/monthly/generate:
    post:
      tags: [Recaps]
      summary: Generate monthly recap
      operationId: generateMonthlyRecap
      description: |
        Generates a monthly recap from journals in the selected month.
        Only journals with status summarized or edited are included.
        Minimum required: 3 journals.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateMonthlyRecapRequest"
            examples:
              generate:
                value:
                  month: "2026-05"
      responses:
        "200":
          description: Generated monthly recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyRecap"
        "400":
          description: Not enough journals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notEnoughData:
                  value:
                    code: NOT_ENOUGH_MONTHLY_DATA
                    message: You need at least 3 journal entries this month to generate a monthly recap.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                aiFailure:
                  value:
                    code: MONTHLY_RECAP_GENERATION_FAILED
                    message: We could not generate your monthly recap right now. Please try again.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DatePath:
      name: date
      in: path
      required: true
      description: Journal date in YYYY-MM-DD format.
      schema:
        type: string
        format: date
      example: "2026-05-10"

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            badRequest:
              value:
                code: BAD_REQUEST
                message: Invalid request.
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthorized:
              value:
                code: UNAUTHORIZED
                message: Authentication is required.

  schemas:
    # ─────────────────────────────────────────────
    # AUTH
    # ─────────────────────────────────────────────
    User:
      type: object
      required: [id, email, name, createdAt, lastLoginAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    GoogleOAuthCallbackRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string

    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshToken:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshTokenResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          description: Rotated — replace the old one.

    # ─────────────────────────────────────────────
    # ENUMS
    # ─────────────────────────────────────────────
    PrimaryMood:
      type: string
      enum: [happy, calm, sad, angry, anxious, tired, confused, unknown]

    EmotionTag:
      type: string
      enum:
        [
          overwhelmed,
          grateful,
          lonely,
          hopeful,
          frustrated,
          proud,
          uncertain,
          relieved,
          stressed,
          motivated,
        ]

    TopicTag:
      type: string
      enum:
        [
          work,
          school,
          family,
          relationship,
          health,
          self_esteem,
          future,
          finance,
          friendship,
          personal_growth,
        ]

    JournalStatus:
      type: string
      enum: [empty, in_progress, summarized, edited]

    SafetyFlag:
      type: string
      enum: [none, crisis]

    JournalLanguage:
      type: string
      enum: [id, en, mixed, other]

    MonthlyRecapStatus:
      type: string
      enum: [not_enough_data, ready_to_generate, generated]

    ChatRole:
      type: string
      enum: [user, assistant]

    # ─────────────────────────────────────────────
    # CHAT
    # ─────────────────────────────────────────────
    ChatMessage:
      type: object
      required: [id, journalId, role, content, createdAt]
      properties:
        id:
          type: string
        journalId:
          type: string
        role:
          $ref: "#/components/schemas/ChatRole"
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    SendChatMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        initialMood:
          allOf:
            - $ref: "#/components/schemas/PrimaryMood"
          nullable: true

    ChatActions:
      type: object
      required: [canSummarize, shouldOfferSummary, safetyFlag]
      properties:
        canSummarize:
          type: boolean
        shouldOfferSummary:
          type: boolean
        safetyFlag:
          $ref: "#/components/schemas/SafetyFlag"

    JournalState:
      type: object
      required: [date, status, userMessageCount]
      properties:
        date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/JournalStatus"
        userMessageCount:
          type: integer
          minimum: 0

    GetChatMessagesResponse:
      type: object
      required: [messages, journalState]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        journalState:
          $ref: "#/components/schemas/JournalState"

    SendChatMessageResponse:
      type: object
      required: [message, actions, journalState]
      properties:
        message:
          $ref: "#/components/schemas/ChatMessage"
        actions:
          $ref: "#/components/schemas/ChatActions"
        journalState:
          $ref: "#/components/schemas/JournalState"

    # ─────────────────────────────────────────────
    # JOURNAL
    # ─────────────────────────────────────────────
    Journal:
      type: object
      required:
        [
          id,
          userId,
          date,
          status,
          emotionTags,
          topicTags,
          language,
          isEdited,
          safetyFlag,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
        userId:
          type: string
        date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/JournalStatus"
        title:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        primaryMood:
          allOf:
            - $ref: "#/components/schemas/PrimaryMood"
          nullable: true
        moodIntensity:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        emotionTags:
          type: array
          items:
            $ref: "#/components/schemas/EmotionTag"
        topicTags:
          type: array
          items:
            $ref: "#/components/schemas/TopicTag"
        keyInsight:
          type: string
          nullable: true
        suggestedNextAction:
          type: string
          nullable: true
        language:
          $ref: "#/components/schemas/JournalLanguage"
        isEdited:
          type: boolean
        safetyFlag:
          $ref: "#/components/schemas/SafetyFlag"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        summarizedAt:
          type: string
          format: date-time
          nullable: true

    UpdateJournalRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
        primaryMood:
          $ref: "#/components/schemas/PrimaryMood"
        emotionTags:
          type: array
          items:
            $ref: "#/components/schemas/EmotionTag"
        topicTags:
          type: array
          items:
            $ref: "#/components/schemas/TopicTag"

    CalendarDay:
      type: object
      required: [date, status, primaryMood, moodEmoji, title, isEdited]
      properties:
        date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/JournalStatus"
        primaryMood:
          $ref: "#/components/schemas/PrimaryMood"
        moodEmoji:
          type: string
        title:
          type: string
        isEdited:
          type: boolean

    MonthlyRecapCard:
      type: object
      required: [status, month, journalCount]
      properties:
        status:
          $ref: "#/components/schemas/MonthlyRecapStatus"
        month:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
        title:
          type: string
          nullable: true
        summaryPreview:
          type: string
          nullable: true
        mostFrequentMood:
          allOf:
            - $ref: "#/components/schemas/PrimaryMood"
          nullable: true
        moodEmoji:
          type: string
          nullable: true
        journalCount:
          type: integer
          minimum: 0
        minimumRequired:
          type: integer
          nullable: true

    CalendarResponse:
      type: object
      required: [month, streak, days, monthlyRecap]
      properties:
        month:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
        streak:
          type: integer
          minimum: 0
          description: Consecutive days with status summarized or edited.
        days:
          type: array
          items:
            $ref: "#/components/schemas/CalendarDay"
        monthlyRecap:
          $ref: "#/components/schemas/MonthlyRecapCard"

    # ─────────────────────────────────────────────
    # RECAP
    # ─────────────────────────────────────────────
    GenerateMonthlyRecapRequest:
      type: object
      required: [month]
      properties:
        month:
          type: string
          pattern: "^\\d{4}-\\d{2}$"

    MonthlyRecap:
      type: object
      required:
        [
          id,
          userId,
          month,
          status,
          title,
          summary,
          mostFrequentMood,
          moodDistribution,
          topEmotionTags,
          topTopicTags,
          recurringPattern,
          monthlyInsight,
          suggestedFocusNextMonth,
          journalCount,
          generatedAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
        userId:
          type: string
        month:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
        status:
          type: string
          enum: [generated]
        title:
          type: string
        summary:
          type: string
        mostFrequentMood:
          $ref: "#/components/schemas/PrimaryMood"
        moodDistribution:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        topEmotionTags:
          type: array
          items:
            $ref: "#/components/schemas/EmotionTag"
        topTopicTags:
          type: array
          items:
            $ref: "#/components/schemas/TopicTag"
        recurringPattern:
          type: string
        monthlyInsight:
          type: string
        suggestedFocusNextMonth:
          type: string
        journalCount:
          type: integer
          minimum: 3
        generatedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

